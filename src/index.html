<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Moyo Header</title>

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <!-- Виправлено помилку в синтаксисі wght@500 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="./style.css"
    />
  </head>
  <body>
    <header class="header">
      <a
        href="#"
        class="header__logo-link"
      >
        <img
          src="./images/logo.png"
          alt="Moyo Logo"
          class="header__logo-img"
        />
      </a>

      <nav class="header__nav">
        <ul class="header__menu">
          <li class="header__menu-item">
            <a
              href="#"
              class="header__menu-link is-active"
            >
              Apple
            </a>
          </li>
          <li class="header__menu-item">
            <a
              href="#"
              class="header__menu-link"
            >
              Samsung
            </a>
          </li>
          <li class="header__menu-item">
            <a
              href="#"
              class="header__menu-link"
            >
              Smartphones
            </a>
          </li>
          <li class="header__menu-item">
            <a
              href="#"
              class="header__menu-link"
              data-qa="hover"
            >
              Laptops & computers
            </a>
          </li>
          <li class="header__menu-item">
            <a
              href="#"
              class="header__menu-link"
            >
              Gadgets
            </a>
          </li>
          <li class="header__menu-item">
            <a
              href="#"
              class="header__menu-link"
            >
              Tablets
            </a>
          </li>
          <li class="header__menu-item">
            <a
              href="#"
              class="header__menu-link"
            >
              Photo
            </a>
          </li>
          <li class="header__menu-item">
            <a
              href="#"
              class="header__menu-link"
            >
              Video
            </a>
          </li>
        </ul>
      </nav>
    </header>
  </body>
</html>
